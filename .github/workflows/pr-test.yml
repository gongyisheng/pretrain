name: PR Test

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'configs/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: pr-test-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare:
    runs-on: [self-hosted]
    outputs:
      has_data: ${{ steps.detect.outputs.has_data }}
      has_layers: ${{ steps.detect.outputs.has_layers }}
      has_model: ${{ steps.detect.outputs.has_model }}
      has_training: ${{ steps.detect.outputs.has_training }}
      has_utils: ${{ steps.detect.outputs.has_utils }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch' || context.eventName === 'push') {
              core.setOutput('has_data', 'true');
              core.setOutput('has_layers', 'true');
              core.setOutput('has_model', 'true');
              core.setOutput('has_training', 'true');
              core.setOutput('has_utils', 'true');
              return;
            }

            const pr = context.payload.pull_request;
            const files = await github.paginate(
              github.rest.pulls.listFiles,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, per_page: 100 }
            );
            const names = files.map(f => f.filename);

            const matchAny = (regexps) => names.some(n => regexps.some(r => r.test(n)));

            // Each flag maps a source subtree to its test directory:
            //   src/data      -> tests/fast/data
            //   src/layers    -> tests/fast/layers
            //   src/model     -> tests/fast/model
            //   src/training  -> tests/fast/training + tests/e2e
            //   src/utils     -> tests/fast/utils
            const has_data = matchAny([/^src\/data\//]);
            const has_layers = matchAny([/^src\/layers\//]);
            const has_model = matchAny([/^src\/model\//]);
            const has_training = matchAny([
              /^src\/training\//,
              /^scripts\/train\.py$/,
            ]);
            const has_utils = matchAny([/^src\/utils\//]);

            core.setOutput('has_data', String(has_data));
            core.setOutput('has_layers', String(has_layers));
            core.setOutput('has_model', String(has_model));
            core.setOutput('has_training', String(has_training));
            core.setOutput('has_utils', String(has_utils));

            core.info(`has_data=${has_data} has_layers=${has_layers} has_model=${has_model} has_training=${has_training} has_utils=${has_utils}`);

  lint:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv

      - run: uv run ruff check src/ tests/
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv

      - run: uv run ruff format --check src/ tests/
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv

  test-data:
    needs: [prepare]
    if: needs.prepare.outputs.has_data == 'true'
    runs-on: [self-hosted]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # `--reinstall-package pretrain` forces rebuild of the C++ `_bpe_engine`
      # extension. The .so is built into the source tree, which actions/checkout
      # wipes each run; uv's cache-keys see unchanged .cpp/.h and would otherwise
      # skip the rebuild, leaving the .so missing.
      - run: uv sync --frozen --reinstall-package pretrain
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv

      - name: Run data tests (CPU only)
        env:
          CUDA_VISIBLE_DEVICES: ""
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
        run: uv run pytest tests/fast/data/ -v

  test-layers:
    needs: [prepare]
    if: needs.prepare.outputs.has_layers == 'true'
    runs-on: [self-hosted]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv

      - name: Pick free GPU
        id: pick
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
        run: |
          idx=$(uv run python tests/ci/gpu_lock_exec.py)
          echo "index=$idx" >> "$GITHUB_OUTPUT"
          echo "Picked GPU $idx"

      - name: Run layer tests
        env:
          CUDA_VISIBLE_DEVICES: ${{ steps.pick.outputs.index }}
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
        run: uv run pytest tests/fast/layers/ -v

  test-model:
    needs: [prepare]
    if: needs.prepare.outputs.has_model == 'true'
    runs-on: [self-hosted]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv

      - name: Pick free GPU
        id: pick
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
        run: |
          idx=$(uv run python tests/ci/gpu_lock_exec.py)
          echo "index=$idx" >> "$GITHUB_OUTPUT"
          echo "Picked GPU $idx"

      - name: Run model tests
        env:
          CUDA_VISIBLE_DEVICES: ${{ steps.pick.outputs.index }}
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
        run: uv run pytest tests/fast/model/ -v

  test-utils:
    needs: [prepare]
    if: needs.prepare.outputs.has_utils == 'true'
    runs-on: [self-hosted]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv

      - name: Pick free GPU
        id: pick
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
        run: |
          idx=$(uv run python tests/ci/gpu_lock_exec.py)
          echo "index=$idx" >> "$GITHUB_OUTPUT"
          echo "Picked GPU $idx"

      - name: Run utils tests
        env:
          CUDA_VISIBLE_DEVICES: ${{ steps.pick.outputs.index }}
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
        run: uv run pytest tests/fast/utils/ -v

  test-training:
    needs: [prepare]
    if: needs.prepare.outputs.has_training == 'true'
    runs-on: [self-hosted]
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv

      - name: Pick free GPU
        id: pick
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
        run: |
          idx=$(uv run python tests/ci/gpu_lock_exec.py)
          echo "index=$idx" >> "$GITHUB_OUTPUT"
          echo "Picked GPU $idx"

      - name: Restore tokenizer + dataset
        env:
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
          HF_DATA_DIR: ${{ runner.tool_cache }}/hf-openwebtext-exp
        run: |
          if [ ! -d "$HF_DATA_DIR/tokenizers" ] || [ ! -d "$HF_DATA_DIR/data" ]; then
            mkdir -p "$HF_DATA_DIR"
            uv run hf download gongyisheng/openwebtext-exp --repo-type dataset --local-dir "$HF_DATA_DIR"
          fi
          ln -sfn "$HF_DATA_DIR/tokenizers" tokenizers
          ln -sfn "$HF_DATA_DIR/data" data

      - name: Run training tests
        env:
          CUDA_VISIBLE_DEVICES: ${{ steps.pick.outputs.index }}
          UV_PROJECT_ENVIRONMENT: ${{ runner.tool_cache }}/ci-venv
        run: |
          uv run pytest \
            tests/fast/training/ \
            tests/e2e/ \
            -v
