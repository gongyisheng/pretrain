max_seq_len: 1024

model:
  arch: "gpt2"
  n_layers: 12
  n_heads: 12
  d_model: 768
  vocab_size: 50257
  dropout: 0.0

data:
  dataset: "openwebtext"
  tokenizer_path: "tokenizers/custom_bpe_50k"
  data_dir: "data/"
  val_split: 0.01
  num_workers: 4

training:
  batch_size: 4
  gradient_accumulation_steps: 15
  max_steps: 100000
  mixed_precision: "bf16"
  activation_checkpointing: true
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/"
  checkpoint_every: 5000
  eval_every: 1000
  eval_steps: 200

optimizer:
  name: "muon"
  lr: 0.04          # matrix params (Muon)
  muon_embed_lr: 0.6     # embedding params
  muon_scalar_lr: 0.04   # scalar/bias params
  betas: [0.9, 0.95]
  eps: 1e-8
  muon_momentum: 0.95
  muon_backend_steps: 5
  muon_momentum_warmup_start: 0.85
  muon_momentum_warmup_steps: 300

scheduler:
  name: "cosine"
  warmup_steps: 300
  min_lr: 0.004     # ~10% of matrix lr

logging:
  wandb_project: "pretrain"
  wandb_run_name: "gpt2-muon"
  log_every: 10
