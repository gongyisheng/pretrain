max_seq_len: 1024
model:
  attn:
  - attn_cls: mla
    attn_kwargs:
      n_heads: 8
      qk_nope_head_dim: 64
      qk_rope_head_dim: 32
      v_head_dim: 64
      kv_lora_rank: 256
      q_lora_rank: 384
      dropout: 0.0
  mlp:
  - mlp_cls: moe
    mlp_kwargs:
      intermediate_size: 128
      n_routed_experts: 64
      n_routed_experts_per_token: 4
      aux_loss: true
      aux_loss_coef: 0.01
      dropout: 0.0
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
  dropout_embd: 0.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 8
  gradient_accumulation_steps: 32
  max_steps: 50000
  mixed_precision: bf16
  activation_checkpointing: false
  seed: 42
  grad_clip: 1.0
  checkpoint_dir: checkpoints/deepseek_v2/
  checkpoint_every: 5000
  eval_every: 100
  eval_steps: 100
optimizer:
  name: adamw
  lr: 5e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 1500
  min_lr: 5e-5
logging:
  wandb_project: pretrain
  wandb_run_name: deepseek-v2-136m-a42m
  log_every: 10
