max_seq_len: 1024
model:
  attn:
  - attn_cls: mha
    attn_kwargs:
      n_heads: 12
      dropout: 0.0
      bias: true
  mlp:
  - mlp_cls: dense
    mlp_kwargs:
      activation: gelu
      gated: false
      bias: true
      dropout: 0.0
  d_model: 768
  n_layers: 12
  vocab_size: 50257
  norm_cls: layernorm
  pos_emb_cls: learned
  dropout_embd: 0.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 0
training:
  batch_size: 12
  gradient_accumulation_steps: 4
  max_steps: 100000
  mixed_precision: bf16
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: checkpoints/
  checkpoint_every: 5000
  eval_every: 100
  eval_steps: 100
optimizer:
  name: adamw
  lr: 6e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 2000
  min_lr: 6e-5
logging:
  wandb_project: pretrain
  wandb_run_name: gpt2-124m
  log_every: 10
