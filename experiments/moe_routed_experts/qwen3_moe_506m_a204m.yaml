max_seq_len: 1024
model:
  d_model: 1024
  n_layers: 16
  vocab_size: 50257
  attn_cls: gqa
  attn_kwargs:
    n_heads: 16
    n_kv_heads: 8
    qk_norm: true
  mlp_cls: moe
  mlp_kwargs:
    intermediate_size: 128
    n_routed_experts: 64
    n_routed_experts_per_token: 16
    aux_loss_coef: 0.01
    expert_capacity_factor: 1.25
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 8
  gradient_accumulation_steps: 32
  max_steps: 50000
  mixed_precision: bf16
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: checkpoints/moe_routed_experts/qwen3_moe_506m_a204m/
  checkpoint_every: 5000
  eval_every: 100
  eval_steps: 25
optimizer:
  name: adamw
  lr: 5e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 1000
  min_lr: 5e-5
logging:
  wandb_project: pretrain-moe
  wandb_run_name: qwen3-moe-routed-experts-506m-a204m
  log_every: 10
