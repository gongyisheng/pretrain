max_seq_len: 1024

model:
  arch: "gpt2"
  n_layers: 12
  n_heads: 12
  d_model: 768
  vocab_size: 50257
  dropout: 0.0

data:
  dataset: "openwebtext"
  tokenizer_path: "tokenizers/custom_bpe_50k"
  data_dir: "data/"
  val_split: 0.01
  num_workers: 0
  eot_token_id: 0

training:
  batch_size: 12
  gradient_accumulation_steps: 4
  max_steps: 20000
  mixed_precision: "bf16"
  backend: "torch"
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: "experiments/cross_doc/checkpoints/baseline"
  checkpoint_every: 5000
  eval_every: 500
  eval_steps: 100
  doc_mask: false

optimizer:
  name: "adamw"
  lr: 6e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  name: "cosine"
  warmup_steps: 2000
  min_lr: 6e-5

logging:
  wandb_project: "pretrain"
  wandb_run_name: "cross-doc-baseline"
  wandb_group: "cross-doc-sweep"
  log_every: 10
