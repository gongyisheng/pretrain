max_seq_len: 4096

model:
  arch: "qwen3"
  n_layers: 8
  n_heads: 8
  n_kv_heads: 4
  d_model: 512
  vocab_size: 50257
  rope_theta: 10000.0
  qk_norm: true

data:
  dataset: "openwebtext"
  tokenizer_path: "tokenizers/custom_bpe_50k"
  data_dir: "data/"
  val_split: 0.01
  num_workers: 0
  eot_token_id: 0

training:
  batch_size: 16
  gradient_accumulation_steps: 16
  max_steps: 50000
  mixed_precision: "bf16"
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/intra_doc_masking/qwen3_57m_seqlen_4096_baseline"
  checkpoint_every: 5000
  eval_every: 100
  eval_steps: 25
  intra_doc_masking: false

optimizer:
  name: "adamw"
  lr: 6e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  name: "cosine"
  warmup_steps: 1500
  min_lr: 6e-5

logging:
  wandb_project: "pretrain-intra-doc-masking"
  wandb_run_name: "qwen3-57m-seqlen-4096-baseline"
  log_every: 10
