max_seq_len: 1024
model:
  attn:
  - attn_cls: gqa
    attn_kwargs:
      n_heads: 8
      n_kv_heads: 4
      qk_norm: true
  mlp:
  - mlp_cls: dense
    mlp_kwargs: {}
  d_model: 512
  n_layers: 8
  vocab_size: 200000
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_200k
  data_dir: data/vocab_200k/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 16
  gradient_accumulation_steps: 16
  max_steps: 10000
  mixed_precision: bf16
  grad_clip: 1.0
  checkpoint_dir: checkpoints/tokenizer_vocab/qwen3_57m_vocab200k/
  checkpoint_every: 500
  eval_every: 100
  eval_steps: 25
optimizer:
  name: adamw
  lr: 6e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 200
  min_lr: 6e-5
logging:
  wandb_project: pretrain-tokenizer-vocab
  wandb_run_name: qwen3-57m-vocab200k
  log_every: 10
