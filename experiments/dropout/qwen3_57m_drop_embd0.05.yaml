max_seq_len: 1024

model:
  arch: "qwen3"
  n_layers: 8
  n_heads: 8
  n_kv_heads: 4
  d_model: 512
  vocab_size: 50257
  dropout_embd: 0.05
  dropout_attn: 0.0
  dropout_ffn: 0.0
  rope_theta: 10000.0
  qk_norm: true

data:
  dataset: "openwebtext"
  tokenizer_path: "tokenizers/custom_bpe_50k"
  data_dir: "data/"
  val_split: 0.01
  num_workers: 4

training:
  batch_size: 8
  gradient_accumulation_steps: 32
  max_steps: 5000
  mixed_precision: "bf16"
  backend: "torch"
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/dropout/dropout_embd/qwen3_drop_embd0.05/"
  checkpoint_every: 500
  eval_every: 100
  eval_steps: 25

optimizer:
  name: "adamw"
  lr: 6e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  name: "cosine"
  warmup_steps: 100
  min_lr: 6e-5

logging:
  wandb_project: "pretrain-dropout"
  wandb_run_name: "qwen3-57m-drop-embd0.05"
  log_every: 10

debug:
  max_steps: 1000
