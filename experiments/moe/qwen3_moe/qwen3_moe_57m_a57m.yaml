max_seq_len: 1024

model:
  arch: "qwen3_moe"
  n_layers: 8
  n_heads: 8
  n_kv_heads: 4
  d_model: 512
  moe_intermediate_size: 128
  vocab_size: 50257
  dropout: 0.1
  rope_theta: 10000.0
  qk_norm: true
  n_experts: 16
  n_experts_per_token: 16
  moe_aux_loss_coef: 0.01
  moe_expert_capacity_factor: 1.25

data:
  dataset: "openwebtext"
  tokenizer_path: "tokenizers/custom_bpe_50k"
  data_dir: "data/"
  val_split: 0.01
  num_workers: 4

training:
  batch_size: 8
  gradient_accumulation_steps: 4
  max_steps: 60000
  mixed_precision: "bf16"
  activation_checkpointing: false
  backend: "triton"
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/moe/qwen3_moe_57m_a57m/"
  checkpoint_every: 5000
  eval_every: 1000
  eval_steps: 200

optimizer:
  name: "adamw"
  lr: 6e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  name: "cosine"
  warmup_steps: 1500
  min_lr: 6e-5

logging:
  wandb_project: "pretrain-moe"
  wandb_run_name: "qwen3-moe-57m-a57m"
  log_every: 10
