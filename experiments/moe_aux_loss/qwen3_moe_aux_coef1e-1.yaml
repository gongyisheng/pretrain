max_seq_len: 1024
model:
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  attn_cls: gqa
  attn_kwargs:
    n_heads: 8
    n_kv_heads: 4
    qk_norm: true
    dropout: 0.0
  mlp_cls: moe
  mlp_kwargs:
    intermediate_size: 128
    n_experts: 64
    n_experts_per_token: 2
    expert_capacity_factor: 1.25
    dropout: 0.0
    aux_loss_coef: 0.1
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
  dropout_embd: 0.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 16
  gradient_accumulation_steps: 16
  max_steps: 8000
  mixed_precision: bf16
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: checkpoints/moe_aux_loss/qwen3_moe_aux_coef1e-1/
  checkpoint_every: 500
  eval_every: 100
  eval_steps: 25
optimizer:
  name: adamw
  lr: 6e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 300
  min_lr: 6e-5
logging:
  wandb_project: pretrain-moe-aux-loss
  wandb_run_name: qwen3-moe-auxloss-coef1e-1
  log_every: 10
