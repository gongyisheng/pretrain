max_seq_len: 1024
model:
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  attn:
  - attn_cls: gqa
    attn_kwargs:
      n_heads: 8
      n_kv_heads: 4
      qk_norm: true
      dropout: 0.0
  mlp:
  - mlp_cls: moe
    mlp_kwargs:
      intermediate_size: 192
      n_routed_experts: 64
      n_routed_experts_per_token: 8
      aux_loss: true
      aux_loss_coef: 1e-1
      dropout: 0.0
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
  dropout_embd: 0.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 32
  gradient_accumulation_steps: 8
  max_steps: 50000
  mixed_precision: bf16
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: checkpoints/moe_aux_loss/qwen3_183m_a51m_softmax_aux_coef1e-1/
  checkpoint_every: 5000
  eval_every: 100
  eval_steps: 100
  eval_batch_size: 64
optimizer:
  name: muon
  lr: 1e-3
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
  muon_momentum: 0.95
  muon_nesterov: true
  muon_adjust_lr_fn: match_rms_adamw
scheduler:
  name: cosine
  warmup_steps: 1500
  min_lr: 1e-4
logging:
  wandb_project: pretrain-moe-aux-loss
  wandb_run_name: qwen3-183m-a51m-softmax-auxloss-coef1e-1
  log_every: 100
