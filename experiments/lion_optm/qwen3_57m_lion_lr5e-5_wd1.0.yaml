max_seq_len: 1024
model:
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  attn_cls: gqa
  mlp_cls: dense
  norm_cls: rmsnorm
  pos_emb_cls: rope
  attn_kwargs:
    n_heads: 8
    n_kv_heads: 4
    qk_norm: true
  mlp_kwargs: {}
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 16
  gradient_accumulation_steps: 16
  max_steps: 50000
  mixed_precision: bf16
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: checkpoints/lion_optm/qwen3_57m_lion_lr5e-5_wd1.0/
  checkpoint_every: 5000
  eval_every: 1000
  eval_steps: 200
optimizer:
  name: lion
  lr: 5e-5
  weight_decay: 1.0
  betas:
  - 0.9
  - 0.99
scheduler:
  name: cosine
  warmup_steps: 1000
  min_lr: 5e-6
logging:
  wandb_project: pretrain-lion-optm
  wandb_run_name: qwen3-57m-lion-lr5e-5-wd1.0
  log_every: 10
