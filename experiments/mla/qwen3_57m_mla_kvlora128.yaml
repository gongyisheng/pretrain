# kv_lora_rank sweep: 128 (q_lora=0, qk_rope=32 fixed).
max_seq_len: 1024
model:
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  attn_cls: mla
  attn_kwargs:
    n_heads: 8
    qk_nope_head_dim: 64
    qk_rope_head_dim: 32
    v_head_dim: 64
    kv_lora_rank: 128
    q_lora_rank: 0
  mlp_cls: dense
  mlp_kwargs: {}
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 16
  gradient_accumulation_steps: 16
  max_steps: 6500
  mixed_precision: bf16
  grad_clip: 1.0
  checkpoint_dir: checkpoints/mla/kvlora128/
  checkpoint_every: 500
  eval_every: 100
  eval_steps: 25
optimizer:
  name: adamw
  lr: 6e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 200
  min_lr: 6e-5
logging:
  wandb_project: pretrain-mla
  wandb_run_name: mla-kvlora128
  log_every: 10
