# Phase 3 qk_nope:qk_rope split: 48:16 (total=64, v_head=64, kv_lora=512 fixed).
max_seq_len: 1024
model:
  attn:
  - attn_cls: mla
    attn_kwargs:
      n_heads: 8
      qk_nope_head_dim: 48
      qk_rope_head_dim: 16
      v_head_dim: 64
      kv_lora_rank: 512
      q_lora_rank: 0
  mlp:
  - mlp_cls: dense
    mlp_kwargs: {}
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 16
  gradient_accumulation_steps: 16
  max_steps: 50000
  mixed_precision: bf16
  grad_clip: 1.0
  checkpoint_dir: checkpoints/mla/nope_48_rope_16/
  checkpoint_every: 5000
  eval_every: 100
  eval_steps: 25
optimizer:
  name: adamw
  lr: 6e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 1000
  min_lr: 6e-5
logging:
  wandb_project: pretrain-mla
  wandb_run_name: qwen3-57m-mla-nope-48-rope-16
  log_every: 10
