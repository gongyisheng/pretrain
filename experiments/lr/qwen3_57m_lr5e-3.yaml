max_seq_len: 1024

model:
  arch: "qwen3"
  n_layers: 8
  n_heads: 8
  n_kv_heads: 4
  d_model: 512
  vocab_size: 50257
  rope_theta: 10000.0
  qk_norm: true

data:
  dataset: "openwebtext"
  tokenizer_path: "tokenizers/custom_bpe_50k"
  data_dir: "data/"
  val_split: 0.01
  num_workers: 4

training:
  batch_size: 4
  gradient_accumulation_steps: 8
  max_steps: 50000
  mixed_precision: "bf16"
  backend: "torch"
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/lr/qwen3_lr5e-3/"
  checkpoint_every: 5000
  eval_every: 1000
  eval_steps: 200

optimizer:
  name: "adamw"
  lr: 5e-3
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  name: "cosine"
  warmup_steps: 1000
  min_lr: 5e-4

logging:
  wandb_project: "pretrain-lr"
  wandb_run_name: "qwen3-57m-lr5e-3"
  log_every: 10
