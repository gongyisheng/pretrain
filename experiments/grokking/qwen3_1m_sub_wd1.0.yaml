task: "sft"
max_seq_len: 5

model:
  arch: "qwen3"
  n_layers: 4
  n_heads: 4
  n_kv_heads: 2
  d_model: 128
  vocab_size: 105
  qk_norm: true
  rope_theta: 10000.0

data:
  dataset: "grokking_sub_p97_f0.3"
  tokenizer_path: "tokenizers/grokking"
  data_dir: "data/grokking_sub_p97_f0.3/"
  packing: false
  num_workers: 2
  question_len: 4
  answer_len: 1

training:
  batch_size: 512
  gradient_accumulation_steps: 1
  max_steps: 100000
  mixed_precision: "bf16"
  seed: 42
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/grokking/qwen3_1m_sub_wd1.0/"
  checkpoint_every: 10000
  eval_every: 100
  eval_steps: 0
  eval_train: true
  intra_doc_masking: false

optimizer:
  name: "adamw"
  lr: 1e-3
  weight_decay: 1.0
  betas: [0.9, 0.98]

scheduler:
  name: "constant"
  warmup_steps: 10

logging:
  wandb_project: "pretrain-grokking"
  wandb_run_name: "grokking-qwen3-1m-sub-wd1.0"
  log_every: 50
