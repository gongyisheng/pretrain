task: sft
max_seq_len: 6
model:
  attn:
  - attn_cls: gqa
    attn_kwargs:
      n_heads: 4
      n_kv_heads: 2
      qk_norm: true
  mlp:
  - mlp_cls: dense
    mlp_kwargs: {}
  d_model: 128
  n_layers: 4
  vocab_size: 103
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: grokking_div_p97_f0.3
  tokenizer_path: tokenizers/grokking
  data_dir: data/grokking_div_p97_f0.3/
  packing: false
  num_workers: 4
training:
  batch_size: 512
  gradient_accumulation_steps: 1
  max_steps: 500000
  mixed_precision: 'no'
  seed: 42
  grad_clip: 1.0
  checkpoint_dir: checkpoints/grokking/qwen3_1m_div_wd1.0/
  checkpoint_every: 10000
  eval_every: 100
  eval_steps: 0
  eval_train: true
  intra_doc_masking: false
optimizer:
  name: adamw
  lr: 1e-3
  weight_decay: 1.0
  betas:
  - 0.9
  - 0.98
scheduler:
  name: constant
  warmup_steps: 0
logging:
  wandb_project: pretrain-grokking
  wandb_run_name: grokking-qwen3-1m-div-wd1.0
  log_every: 10
