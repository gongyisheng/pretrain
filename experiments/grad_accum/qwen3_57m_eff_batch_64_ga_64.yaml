max_seq_len: 1024
model:
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  attn:
  - attn_cls: gqa
    attn_kwargs:
      n_heads: 8
      n_kv_heads: 4
      qk_norm: true
  mlp:
  - mlp_cls: dense
    mlp_kwargs: {}
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 1
  gradient_accumulation_steps: 64
  max_steps: 50000
  early_stop: 5000
  mixed_precision: bf16
  seed: 42
  grad_clip: 1.0
  checkpoint_dir: checkpoints/grad_accum/qwen3_57m_eff_batch_64_ga_64/
  checkpoint_every: 1000
  eval_every: 100
  eval_steps: 25
optimizer:
  name: adamw
  lr: 6e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 1500
  min_lr: 6e-5
logging:
  wandb_project: pretrain-grad-accum
  wandb_run_name: qwen3-57m-eff-batch-64-ga-64
  log_every: 10
