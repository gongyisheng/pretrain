max_seq_len: 1024
model:
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  attn:
  - attn_cls: gqa
    attn_kwargs:
      n_heads: 8
      n_kv_heads: 4
      qk_norm: true
  mlp:
  - mlp_cls: dense
    mlp_kwargs:
      intermediate_size: 16384
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 4
  gradient_accumulation_steps: 256
  max_steps: 50000
  mixed_precision: bf16
  seed: 42
  grad_clip: 1.0
  checkpoint_dir: checkpoints/intermediate_size/qwen3_233m_is16384/
  checkpoint_every: 5000
  eval_every: 100
  eval_steps: 100
optimizer:
  name: muon
  lr: 5e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
  muon_momentum: 0.95
  muon_nesterov: true
  muon_adjust_lr_fn: match_rms_adamw
scheduler:
  name: cosine
  warmup_steps: 1500
  min_lr: 5e-5
logging:
  wandb_project: pretrain-intermediate-size
  wandb_run_name: qwen3-233m-is16384
  log_every: 10
