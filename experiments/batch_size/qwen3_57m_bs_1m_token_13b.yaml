max_seq_len: 1024
model:
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  attn:
  - attn_cls: gqa
    attn_kwargs:
      n_heads: 8
      n_kv_heads: 4
      qk_norm: true
  mlp:
  - mlp_cls: dense
    mlp_kwargs: {}
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 8
  gradient_accumulation_steps: 128
  max_steps: 12500
  mixed_precision: bf16
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: checkpoints/batch_size/qwen3_bs_1m_token_13b/
  checkpoint_every: 1000
  eval_every: 250
  eval_steps: 200
optimizer:
  name: adamw
  lr: 6e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 250
  min_lr: 6e-5
logging:
  wandb_project: pretrain-batch-size
  wandb_run_name: qwen3-57m-bs-1m-token-13b
  log_every: 10
