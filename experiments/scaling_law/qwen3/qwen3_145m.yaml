max_seq_len: 1024

model:
  arch: "qwen3"
  n_layers: 12
  n_heads: 12
  n_kv_heads: 6
  d_model: 768
  vocab_size: 50257
  dropout: 0.1
  rope_theta: 10000.0
  qk_norm: true

data:
  dataset: "openwebtext"
  tokenizer_path: "tokenizers/custom_bpe_50k"
  data_dir: "data/"
  val_split: 0.01
  num_workers: 4

training:
  batch_size: 4
  gradient_accumulation_steps: 8
  max_steps: 120000
  mixed_precision: "bf16"
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/scaling_law/qwen3_145m/"
  checkpoint_every: 5000
  eval_every: 1000
  eval_steps: 200

optimizer:
  name: "adamw"
  lr: 6e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  name: "cosine"
  warmup_steps: 2000
  min_lr: 6e-5

logging:
  wandb_project: "pretrain-scaling-law"
  wandb_run_name: "qwen3-145m"
  log_every: 10
