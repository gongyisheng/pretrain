max_seq_len: 1024
model:
  attn:
  - attn_cls: gqa
    attn_kwargs:
      n_heads: 8
      n_kv_heads: 4
      qk_norm: true
  mlp:
  - mlp_cls: dense
    mlp_kwargs: {}
  d_model: 512
  n_layers: 16
  vocab_size: 50257
  norm_cls: rmsnorm
  pos_emb_cls: rope
  pos_emb_kwargs:
    rope_theta: 10000.0
  residual_cls: attn_res
  residual_kwargs:
    seal_block_size: 2
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 8
  gradient_accumulation_steps: 32
  max_steps: 50000
  mixed_precision: bf16
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: checkpoints/attn_res/qwen3_d512_l16/
  checkpoint_every: 5000
  eval_every: 1000
  eval_steps: 200
optimizer:
  name: adamw
  lr: 5e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
  eps: 1e-6
scheduler:
  name: cosine
  warmup_steps: 1500
  min_lr: 5e-5
logging:
  wandb_project: pretrain-attn-res
  wandb_run_name: qwen3-d512-l16
  log_every: 10
