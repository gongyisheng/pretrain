max_seq_len: 1024

model:
  arch: "qwen3"
  n_layers: 20
  n_heads: 8
  n_kv_heads: 4
  d_model: 512
  vocab_size: 50257
  qk_norm: true
  rope_theta: 10000.0
  attn_res: true
  attn_res_block_size: 2  # boundaries at layers 0, 2, ..., 18 → 10 blocks

data:
  dataset: "openwebtext"
  tokenizer_path: "tokenizers/custom_bpe_50k"
  data_dir: "data/"
  val_split: 0.01
  num_workers: 4

training:
  batch_size: 8
  gradient_accumulation_steps: 32
  max_steps: 15000
  mixed_precision: "bf16"
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/attn_res/qwen3_d512_l20/"
  checkpoint_every: 500
  eval_every: 100
  eval_steps: 25

optimizer:
  name: "adamw"
  lr: 6e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]
  eps: 1e-6

scheduler:
  name: "cosine"
  warmup_steps: 300
  min_lr: 6e-5

logging:
  wandb_project: "pretrain-attn-res"
  wandb_run_name: "qwen3-d512-l20"
  log_every: 10
