max_seq_len: 8192
model:
  d_model: 512
  n_layers: 8
  vocab_size: 50257
  attn_cls: gqa
  mlp_cls: dense
  norm_cls: rmsnorm
  pos_emb_cls: rope
  attn_kwargs:
    n_heads: 8
    n_kv_heads: 4
    qk_norm: true
  mlp_kwargs: {}
  pos_emb_kwargs:
    rope_theta: 10000.0
data:
  dataset: openwebtext
  tokenizer_path: tokenizers/custom_bpe_50k
  data_dir: data/
  val_split: 0.01
  num_workers: 4
training:
  batch_size: 4
  gradient_accumulation_steps: 64
  max_steps: 50000
  mixed_precision: bf16
  activation_checkpointing: false
  grad_clip: 1.0
  checkpoint_dir: checkpoints/seq_len/qwen3_seq8192/
  checkpoint_every: 5000
  eval_every: 100
  eval_steps: 25
  intra_doc_masking: true
optimizer:
  name: adamw
  lr: 6e-4
  weight_decay: 0.1
  betas:
  - 0.9
  - 0.95
scheduler:
  name: cosine
  warmup_steps: 1500
  min_lr: 6e-5
logging:
  wandb_project: pretrain-seq-len
  wandb_run_name: qwen3-57m-seq8192
  log_every: 10
