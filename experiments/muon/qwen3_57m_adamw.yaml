max_seq_len: 1024

model:
  arch: "qwen3"
  n_layers: 8
  n_heads: 8
  n_kv_heads: 4
  d_model: 512
  vocab_size: 50257
  dropout_embd: 0.0
  dropout_attn: 0.0
  dropout_ffn: 0.0
  rope_theta: 10000.0
  qk_norm: true

data:
  dataset: "openwebtext"
  tokenizer_path: "tokenizers/custom_bpe_50k"
  data_dir: "data/"
  val_split: 0.01
  num_workers: 4

training:
  batch_size: 16
  gradient_accumulation_steps: 16
  max_steps: 50000
  mixed_precision: "bf16"
  activation_checkpointing: false
  seed: 42
  grad_clip: 1.0
  checkpoint_dir: "checkpoints/muon/qwen3_57m_adamw/"
  checkpoint_every: 5000
  eval_every: 1000
  eval_steps: 200

optimizer:
  name: "adamw"
  lr: 5e-4
  weight_decay: 0.1
  betas: [0.9, 0.95]

scheduler:
  name: "cosine"
  warmup_steps: 1500
  min_lr: 5e-5

logging:
  wandb_project: "pretrain-muon"
  wandb_run_name: "qwen3-57m-adamw"
  log_every: 10
